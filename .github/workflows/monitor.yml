name: Monitor de Investimentos

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * *'

jobs:

  monitor:

    runs-on: ubuntu-latest

    steps:

      - name: Baixar projeto
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt

      - name: Executar monitor
        run: |
          python monitor.py

      - name: Verificar arquivos gerados
        run: |
          echo "=== Pasta dados/ ==="
          ls -la dados/ || echo "Pasta dados/ não encontrada"
          echo "=== Pasta relatorios/ ==="
          ls -la relatorios/ || echo "Pasta relatorios/ não encontrada"

      - name: Salvar dados e relatório no repositório
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add -f relatorios/
          git add -f dados/
          git status
          git diff --cached --stat
          git commit -m "Relatório automático $(date +'%d/%m/%Y %H:%M')" || echo "Nada novo para commitar"
          git push || echo "Push sem alterações"
