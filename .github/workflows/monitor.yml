name: Monitor de Investimentos

permissions:
  contents: write

on:

  workflow_dispatch:

  schedule:
    - cron: '0 10 * * *'

jobs:

  monitor:

    runs-on: ubuntu-latest

    steps:

      - name: Baixar projeto
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt

      - name: Executar monitor
        run: |
          python monitor.py

      - name: Salvar relatório no repositório
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add relatorios/
          git commit -m "Atualiza relatório automático" || exit 0
          git push
