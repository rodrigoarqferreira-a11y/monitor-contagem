name: Monitor de Investimentos

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * *'

jobs:

  monitor:
    runs-on: ubuntu-latest

    steps:

      - name: Baixar projeto
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar monitor
        run: python monitor.py

      - name: Copiar HTML mais recente como ultimo_relatorio
        run: |
          # Pega o HTML mais recente gerado hoje (por timestamp no nome)
          ULTIMO=$(ls -t relatorios/relatorio_*.html 2>/dev/null | head -1)
          if [ -n "$ULTIMO" ]; then
            cp "$ULTIMO" relatorios/ultimo_relatorio.html
            echo "Copiado: $ULTIMO → relatorios/ultimo_relatorio.html"
            echo "Tamanho: $(wc -c < relatorios/ultimo_relatorio.html) bytes"
          else
            echo "Nenhum HTML gerado encontrado"
          fi

      - name: Verificar o que será commitado
        run: |
          echo "=== Status git ==="
          git status
          echo "=== Arquivos novos/modificados ==="
          git diff --name-only HEAD 2>/dev/null || true
          git ls-files --others --exclude-standard relatorios/ dados/ 2>/dev/null || true

      - name: Salvar no repositório
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add -f relatorios/
          git add -f dados/
          git status
          git commit -m "Monitor $(date +'%d/%m/%Y %H:%M') - automático" || echo "Sem alterações"
          git push
