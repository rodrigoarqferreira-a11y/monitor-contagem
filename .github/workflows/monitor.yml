name: Monitor de Investimentos

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * *'

jobs:

  monitor:
    runs-on: ubuntu-latest

    steps:

      - name: Baixar projeto
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar monitor
        run: python monitor.py

      - name: Copiar HTML mais recente como ultimo_relatorio
        run: |
          ULTIMO=$(ls -t relatorios/relatorio_*.html 2>/dev/null | head -1)
          if [ -n "$ULTIMO" ]; then
            cp "$ULTIMO" relatorios/ultimo_relatorio.html
            echo "Copiado: $ULTIMO"
            echo "Tamanho: $(wc -c < relatorios/ultimo_relatorio.html) bytes"
          else
            echo "Nenhum HTML encontrado"
            exit 1
          fi

      - name: Salvar no repositório
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add -f relatorios/
          git add -f dados/
          echo "--- Arquivos no commit ---"
          git diff --cached --name-only
          echo "--- Fazendo commit ---"
          git commit -m "Monitor $(date +'%d/%m/%Y %H:%M') - automático"
          echo "--- Fazendo push ---"
          git pull --rebase origin main
          git push origin main
          echo "--- Push concluído ---"
