name: Monitor de Investimentos

permissions:
  contents: write

on:

  workflow_dispatch:

  schedule:
    - cron: '0 10 * * *'

jobs:

  monitor:

    runs-on: ubuntu-latest

    steps:

      - name: Baixar projeto
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt

      - name: Testar métodos de histórico
        run: |
          python -c "
          import json
          from banco import Banco
          from relatorio import GeradorRelatorio

          banco = Banco()
          gerador = GeradorRelatorio(banco)

          print('=== DADOS COMPLETOS (3 primeiros) ===')
          dados = gerador.dados_historico_completo()
          print(json.dumps(dados[:3], indent=2, ensure_ascii=False))
          "

      - name: Salvar relatório no repositório
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add relatorios/
          git commit -m "Atualiza relatório automático" || exit 0
          git push
